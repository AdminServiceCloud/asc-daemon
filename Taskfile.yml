# 🛠️ Taskfile — development, build and release commands for asc-daemon
# https://taskfile.dev · install: go install github.com/go-task/task/v3/cmd/task@latest
version: '3'

vars:
  TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu armv7-unknown-linux-gnueabihf

tasks:
  default:
    desc: 📋 List all commands
    cmds:
      - task --list

  # ── 🧑‍💻 Development ──────────────────────────────────────────────

  dev:
    desc: 🚀 Run the daemon locally (debug, verbose logs)
    cmds:
      - RUST_LOG=debug cargo run --bin asc -- serve

  dev:cli:
    desc: 💻 Run a CLI command against the local daemon (task dev:cli -- status)
    cmds:
      - cargo run --bin asc -- {{.CLI_ARGS}}

  dev:updater:
    desc: 🔄 Run asc-updater locally (task dev:updater -- status)
    cmds:
      - cargo run --bin asc-updater -- {{.CLI_ARGS}}

  proto:
    desc: 📜 Generate Rust code from the proto contracts (prost/tonic)
    cmds:
      - cargo build   # build.rs compiles proto/ via protox (no protoc needed)

  # ── ✅ Quality ────────────────────────────────────────────────────

  lint:
    desc: 🔍 Clippy + formatting check
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings
      - cargo fmt --all -- --check

  fmt:
    desc: 🎨 Format the code
    cmds:
      - cargo fmt --all

  test:
    desc: 🧪 Tests
    cmds:
      - cargo test --all

  check:
    desc: ✅ Full pre-commit check (lint + test)
    cmds:
      - task: lint
      - task: test

  # ── 📦 Build and release ──────────────────────────────────────────

  build:
    desc: 📦 Release build for the current platform (asc + asc-updater)
    cmds:
      - cargo build --release

  build:cross:
    desc: 🧬 Cross-compile for all supported architectures (requires cross)
    cmds:
      - for: { var: TARGETS }
        cmd: cross build --release --target {{.ITEM}}

  install:local:
    desc: 🔧 Install the built binaries into /usr/local/bin (requires sudo)
    deps: [build]
    cmds:
      - sudo install -m 755 target/release/asc /usr/local/bin/asc
      - sudo install -m 755 target/release/asc-updater /usr/local/bin/asc-updater

  # ── 🚀 Production ─────────────────────────────────────────────────

  prod:service:
    desc: 🚀 Install and start as a systemd service (requires sudo)
    deps: [install:local]
    cmds:
      - sudo asc service install
      - sudo systemctl enable --now asc

  prod:status:
    desc: 📊 Production service status
    cmds:
      - systemctl status asc --no-pager
      - asc status
